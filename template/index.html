<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
</head>

<body style="font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px;">

    <h1 style="font-size: 2rem; margin-bottom: 24px;">📝 My To-Do List</h1>

    <form action="{% url 'add_todo' %}" method="POST" style="display: flex; gap: 20px; margin-bottom: 30px;"> {%csrf_token %}
        <input type="text" name="tittle" placeholder="Add a new task..." required
            style="flex: 1; border-radius: 30px; border: 2px solid #ccc; font-size: 1rem; padding: 10px 14px;">
        <button type="submit"
            style="display: flex; border-radius: 9px; border: none; padding: 10px 20px; background: #2563eb; color: white; font-size: 1rem; cursor: pointer;">Add</button>

    </form>

    <ul style="list-style: none; padding: 0; margin: 0; ">
        {% for todo in todos %}

        <li style="display: flex; align-items: center; justify-content: space-between; font-family: 'Times New Roman', Times, serif; padding: 12px 16px; background: #f9f9f9; border-radius: 6px; margin-bottom: 16px; {% if todo.done%} opacity: 0.5; {% endif %}">
            <span style="font-size: 1rem; {% if todo.done %} text-decoration: line-through;{% endif %}"></span>
            {{ todo.tittle }}

            <div style="display: flex; gap: 8px;">
                <a href="{% url 'toggle_todo' todo.pk %}" style="padding: 6px 12px; color: white; border-radius: 6px; text-decoration: none; font-size: 0.85rem; background: {% if todo.done %}#6b7280 {% else %} #16a34a{% endif %};">{% if todo.done %}Undo{% else %} Done {% endif %}</a>

                <a href="{% url 'delete_todo' todo.pk  %}" style="padding: 6px 12px; color: red; border-radius: 6px; text-decoration: none; font-size: 0.85rem;">Delete</a>

            </div>
        </li>
        {% empty %}
        <p style="color: #4a4545; padding: 2px 10px; text-align: center;">No tasks yet...Add one above!</p>
        {% endfor %}
    </ul>

       

</body>

</html>
